server:
  port: 8084

spring:
  datasource:
    url: ${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=notificationdb;encrypt=true;trustServerCertificate=true}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:123}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.SQLServerDialect
        type:
          preferred_instant_jdbc_type: TIMESTAMP
  flyway:
    enabled: true
    locations: classpath:db/migration/sqlserver
  mail:
    host: ${SMTP_HOST:smtp.example.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:username}
    password: ${SMTP_PASSWORD:password}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

  # --- MOVED KAFKA INSIDE SPRING BLOCK ---
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:notification-group}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: com.notificationservice.infrastructure.dto.NotificationEventRequest
        spring.json.use.type.info.headers: false
    producer:                                                          # ← same indent as consumer
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
notification:
  mail:
    from: ${SMTP_FROM:no-reply@example.com}
  retry:
    max-attempts: 3
    batch-size: 50
    delay-ms: 60000
  kafka:
    dispatch-topic: ${NOTIFICATION_DISPATCH_TOPIC:notification.dispatch}