services:
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: local-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_HEAP_OPTS: "-Xmx512M -Xms512M"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    deploy:
      resources:
        limits:
          memory: 800M
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 3

  gatewayservice:
    build: ./gatewayservice
    container_name: gatewayservice
    ports:
      - "8080:8080"
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx128M -Xms128M -Dfile.encoding=UTF-8"
      BOOK_SERVICE_URL: http://bookservice:8082
      READER_SERVICE_URL: http://readerservice:8081
      BORROW_SERVICE_URL: http://borrowservice:8083
      AUDIT_SERVICE_URL: http://auditservice:8085
      NOTIFICATION_SERVICE_URL: http://notificationservice:8084
    deploy:
      resources:
        limits:
          memory: 400M

  readerservice:
    build: ./readerservice
    container_name: readerservice
    ports:
      - "8081:8081"
    depends_on:
      kafka:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx256M -Xms256M -Dfile.encoding=UTF-8"
      SPRING_APPLICATION_NAME: Reader Service
      SPRING_DATASOURCE_URL: jdbc:sqlserver://host.docker.internal:1433;databaseName=readerdb;encrypt=true;trustServerCertificate=true;sendStringParametersAsUnicode=true;
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: 123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    deploy:
      resources:
        limits:
          memory: 400M

  bookservice:
    build: ./bookservice
    container_name: bookservice
    ports:
      - "8082:8082"
    depends_on:
      kafka:
        condition: service_healthy
      genrepredictservice:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx256M -Xms256M -Dfile.encoding=UTF-8"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:sqlserver://host.docker.internal:1433;databaseName=bookdb;encrypt=true;trustServerCertificate=true;sendStringParametersAsUnicode=true;
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: 123
      FASTAPI_PREDICTOR_URL: http://genrepredictservice:8000/predict
    deploy:
      resources:
        limits:
          memory: 400M

  genrepredictservice:
    build: ./genrepredictservice
    container_name: genrepredictservice
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          memory: 512M

  borrowservice:
    build: ./borrowservice
    container_name: borrowservice
    ports:
      - "8083:8083"
    depends_on:
      kafka:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx256M -Xms256M -Dfile.encoding=UTF-8"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:sqlserver://host.docker.internal:1433;databaseName=borrowdb;encrypt=true;trustServerCertificate=true;sendStringParametersAsUnicode=true;
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: 123
      BOOK_SERVICE_URL: http://bookservice:8082
      READER_SERVICE_URL: http://readerservice:8081
    deploy:
      resources:
        limits:
          memory: 400M

  auditservice:
    build: ./auditservice
    container_name: auditservice
    ports:
      - "8085:8085"
    depends_on:
      kafka:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx256M -Xms256M -Dfile.encoding=UTF-8"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:sqlserver://host.docker.internal:1433;databaseName=auditdb;encrypt=true;trustServerCertificate=true;sendStringParametersAsUnicode=true;
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: 123
    deploy:
      resources:
        limits:
          memory: 400M

  notificationservice:
    build: ./notificationservice
    container_name: notificationservice
    ports:
      - "8084:8084"
    depends_on:
      kafka:
        condition: service_healthy
      mailpit:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx256M -Xms256M -Dfile.encoding=UTF-8"
      DB_URL: jdbc:sqlserver://host.docker.internal:1433;databaseName=notificationdb;encrypt=true;trustServerCertificate=true;sendStringParametersAsUnicode=true;
      DB_USERNAME: sa
      DB_PASSWORD: 123
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_USERNAME: ""
      SMTP_PASSWORD: ""
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "false"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "false"
    deploy:
      resources:
        limits:
          memory: 400M

  mailpit:
    image: axllent/mailpit
    container_name: mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_DATA_FILE: /data/mailpit.db
    volumes:
      - mailpit_data:/data
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  mailpit_data: